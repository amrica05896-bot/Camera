name: Build Glass Camera APK (2026 Ultimate Edition)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 21 (Latest)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # هنا الحل السحري: تفعيل AndroidX
    - name: Create Gradle Properties
      run: |
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        EOF

    - name: Create Settings file
      run: |
        cat << 'EOF' > settings.gradle.kts
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "GlassCamera"
        include(":app")
        EOF

    - name: Create Root Build file (Latest Plugins)
      run: |
        cat << 'EOF' > build.gradle.kts
        plugins { 
            id("com.android.application") version "8.7.0" apply false
            id("org.jetbrains.kotlin.android") version "2.1.0" apply false
            id("org.jetbrains.kotlin.plugin.compose") version "2.1.0" apply false
        }
        EOF

    - name: Create App Build file (Latest SDK & Compose)
      run: |
        mkdir -p app
        cat << 'EOF' > app/build.gradle.kts
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
            id("org.jetbrains.kotlin.plugin.compose")
        }
        android {
            namespace = "com.amrica.camera"
            compileSdk = 35
            defaultConfig {
                applicationId = "com.amrica.camera"
                minSdk = 31
                targetSdk = 35
                versionCode = 1
                versionName = "1.0 Pro"
            }
            buildFeatures { compose = true }
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_21
                targetCompatibility = JavaVersion.VERSION_21
            }
            kotlinOptions { jvmTarget = "21" }
        }
        dependencies {
            implementation("androidx.camera:camera-core:1.4.0")
            implementation("androidx.camera:camera-camera2:1.4.0")
            implementation("androidx.camera:camera-lifecycle:1.4.0")
            implementation("androidx.camera:camera-view:1.4.0")
            
            implementation(platform("androidx.compose:compose-bom:2025.01.00"))
            implementation("androidx.activity:activity-compose:1.10.0")
            implementation("androidx.compose.ui:ui")
            implementation("androidx.compose.material3:material3")
            implementation("androidx.core:core-ktx:1.15.0")
        }
        EOF

    - name: Build APK (Powered by Latest Gradle)
      run: gradle :app:assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Glass-Camera-Pro-Latest
        path: app/build/outputs/apk/debug/app-debug.apk
